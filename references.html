<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据来源 — References</title>
  <link rel="icon" href="data:,">
  <meta name="description" content="本项目中使用的转点比例、点数估值和 Portal 兑换值来源">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    :root { --bg: #0a0a1a; --surface: rgba(18,18,38,0.9); --border: rgba(255,255,255,0.06); --dim: #666; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; min-height: 100vh; line-height: 1.7; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse at 30% 40%, rgba(59,130,246,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(167,139,250,0.04) 0%, transparent 50%);
    }
    .container { max-width: 860px; margin: 0 auto; padding: 28px 24px 80px; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 24px;
    }
    .nav-link {
      display: inline-flex; gap: 6px; padding: 5px 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 8px; color: #888; text-decoration: none; font-size: 11px;
      transition: all 0.2s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.08); color: #ccc; }
    .language-toggle {
      display: inline-flex; gap: 2px; padding: 3px;
      background: rgba(20,20,40,0.85); border: 1px solid var(--border);
      border-radius: 10px; flex-shrink: 0;
    }
    .lang-btn {
      padding: 6px 12px; border: none; background: none; color: var(--dim);
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn:hover { color: #ccc; }
    .lang-btn.active { background: rgba(255,255,255,0.08); color: #fff; }
    header { margin-bottom: 36px; }
    header h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    header p { font-size: 13px; color: var(--dim); margin-top: 4px; }

    h2 { font-size: 16px; font-weight: 600; margin: 32px 0 12px; color: #a78bfa; }
    h3 { font-size: 14px; font-weight: 600; margin: 20px 0 8px; }

    .ref-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
    }
    .ref-item {
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex; gap: 12px; align-items: flex-start; font-size: 13px;
    }
    .ref-item:last-child { border-bottom: none; }
    .ref-num {
      flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px;
      background: rgba(167,139,250,0.1); color: #a78bfa;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .ref-content { flex: 1; }
    .ref-title { font-weight: 500; margin-bottom: 2px; }
    .ref-url { font-size: 11px; color: #60a5fa; word-break: break-all; }
    .ref-url a { color: #60a5fa; text-decoration: none; }
    .ref-url a:hover { text-decoration: underline; }
    .ref-note { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .ref-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .ref-tag {
      padding: 1px 8px; border-radius: 4px; font-size: 10px; font-weight: 500;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    }

    .card-color { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.03); }
    th { color: var(--dim); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

    .update-log { font-size: 12px; color: var(--dim); }
    .update-log li { margin-bottom: 6px; }
    .update-log .date { color: #a78bfa; font-weight: 500; }

    footer { text-align: center; padding: 28px 0; font-size: 11px; color: #333; border-top: 1px solid var(--border); }
    footer a { color: #555; text-decoration: none; }

    @media (max-width: 640px) {
      .container { padding: 16px 12px 60px; }
      .top-bar { margin-bottom: 16px; }
      .language-toggle { padding: 2px; }
      .lang-btn { padding: 5px 9px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="nav-link" id="back-link">← 返回转点二分图</a>
      <div class="language-toggle" aria-label="Language switch">
        <button class="lang-btn active" data-language-option="zh-CN" aria-pressed="true">中文</button>
        <button class="lang-btn" data-language-option="en" aria-pressed="false">EN</button>
      </div>
    </div>
    <div id="references-app"></div>
  </div>
  <script type="module" src="js/references-app.js"></script>
</body>
</html>
